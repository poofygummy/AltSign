name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_xcframework:
    name: Build XCFramework
    runs-on: macos-latest
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Write xcconfig
        run: |
          echo 'FRAMEWORK_SEARCH_PATHS = $(inherited) ${{ github.workspace }}/Dependencies' > /tmp/altsign.xcconfig

      - name: Install swift-create-xcframework
        run: |
          git clone --depth 1 --branch v2.3.0 https://github.com/unsignedapps/swift-create-xcframework /tmp/swift-create-xcframework
          cd /tmp/swift-create-xcframework
          swift build -c release
          cp .build/release/swift-create-xcframework /usr/local/bin/

      - name: Build XCFramework
        run: |
          swift-create-xcframework \
            --zip \
            --platform ios \
            --xcconfig /tmp/altsign.xcconfig \
            AltSign

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: "*.zip"
          draft: false
          prerelease: false
          generate_release_notes: true
