name: Create Release

# Build XCFramework and expose the outputs as downloadable GitHub Actions Artifacts.
# Trigger on version tags (v*) for automation, or run manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_xcframework:
    name: Build XCFramework
    runs-on: macos-latest
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Cache swift-create-xcframework
        uses: actions/cache@v4
        with:
          path: /opt/homebrew/Cellar/swift-create-xcframework
          key: swift-create-xcframework-2.4.0

      - name: Install swift-create-xcframework via Homebrew
        run: |
          # Use Homebrew directly (this is what you did by hand that got past the Mint clone error)
          brew install swift-create-xcframework || brew install segment-integrations/formulae/swift-create-xcframework || true

          # The error you showed listed the real names the manifest exports:
          #   AltSign-Dynamic
          #   AltSignStatic
          # We must use one of those exactly.

          echo "Trying product 'AltSignStatic' (one of the exact names from the manifest)..."
          swift-create-xcframework --platform macos --platform ios --platform ios-simulator AltSignStatic || \
          (echo "AltSignStatic did not work, trying AltSign-Dynamic..." && \
           swift-create-xcframework --platform macos --platform ios --platform ios-simulator AltSign-Dynamic) || \
          echo "Tool failed to produce .xcframework. Will still make a zip of build output for you."

      - name: Build + zip using the correct product names + put outputs for the artifact uploads
        id: prepare
        shell: bash
        run: |
          set -eo pipefail

          # Clean previous runs
          rm -rf *.xcframework build-info.txt changelog.md Alt*.zip 2>/dev/null || true

          # The tool (installed earlier in the job) showed these as the only valid product names:
          #   AltSign-Dynamic
          #   AltSignStatic
          # We have to use one of those spellings exactly as positional argument after the options.
          PRODUCT="AltSignStatic"

          echo "=== Calling swift-create-xcframework with product '$PRODUCT' (the name the manifest actually offers) ==="

          # This is the CLI the brew formula provides (not "swift create-xcframework" subcommand).
          # Common platforms that make sense for this kind of library.
          if swift-create-xcframework \
               --platform macos \
               --platform ios \
               --platform ios-simulator \
               "$PRODUCT" ; then
            echo "Tool succeeded for $PRODUCT"
          else
            echo "$PRODUCT did not work, trying the other listed name AltSign-Dynamic..."
            PRODUCT="AltSign-Dynamic"
            swift-create-xcframework \
               --platform macos \
               --platform ios \
               --platform ios-simulator \
               "$PRODUCT" || echo "Tool run finished (check logs for package-level errors inside AltSign)"
          fi

          # The tool normally writes the .xcframework in the current directory.
          XC_PATH=$(find . -maxdepth 2 -type d -name "*.xcframework" -print -quit 2>/dev/null || true)

          if [ -z "$XC_PATH" ] || [ ! -d "$XC_PATH" ]; then
            echo "No .xcframework appeared after the tool ran. The package still has problems (ldid target, submodules, etc.)."
            echo "We will package the .build directory and the info file so there is still something for you to download and inspect."
            XC_PATH=".build"
          fi

          XC_NAME=$(basename "$XC_PATH" | sed 's/\.xcframework$//')
          [ "$XC_PATH" = ".build" ] && XC_NAME="AltSign-raw-build-artifacts"

          ZIP_NAME="${XC_NAME}.zip"

          echo "Creating zip to upload as artifact: $ZIP_NAME"
          if [ "$XC_PATH" = ".build" ]; then
            zip -r -y "$ZIP_NAME" .build 2>/dev/null || true
            echo "product: ${PRODUCT:-none}" > build-info.txt
            echo "sha: $GITHUB_SHA" >> build-info.txt
            echo "note: no xcframework was produced by the tool. Raw SwiftPM build folder instead." >> build-info.txt
            zip -r -y "$ZIP_NAME" build-info.txt 2>/dev/null || true
          else
            ditto -c -k --sequesterRsrc --keepParent "$XC_PATH" "$ZIP_NAME" 2>/dev/null || zip -r -y "$ZIP_NAME" "$XC_PATH"
            echo "product: ${PRODUCT}" > build-info.txt
            echo "sha: $GITHUB_SHA" >> build-info.txt
            zip -r -y "$ZIP_NAME" build-info.txt 2>/dev/null || true
          fi

          ls -lh "$ZIP_NAME" || true

          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "zip_path=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "build_info_path=build-info.txt" >> "$GITHUB_OUTPUT"

      - name: Generate simple changelog (git based)
        id: changelog
        shell: bash
        run: |
          # Generate a basic changelog between the previous tag and now.
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD > changelog.md || echo "- (no commits)" > changelog.md
          else
            git log --pretty=format:"- %s (%h)" -n 50 > changelog.md || echo "- (initial)" > changelog.md
          fi
          echo "changelog_path=changelog.md" >> "$GITHUB_OUTPUT"

      # === Primary goal: Artifacts available for direct download from the Actions run page. ===
      - name: Upload XCFramework (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepare.outputs.zip_name }}
          path: ${{ steps.prepare.outputs.zip_path }}
          retention-days: 1
          if-no-files-found: error

      - name: Upload Build Info (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: ${{ steps.prepare.outputs.build_info_path }}
          retention-days: 1

      - name: Upload Changelog (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: ${{ steps.changelog.outputs.changelog_path }}
          retention-days: 1

      # The steps below (GitHub Release creation + asset upload) are intentionally disabled.
      # They were previously trying to create a release and push assets via the old/deprecated
      # create-release + upload-release-asset actions. If you want that behaviour back later,
      # you can re-enable / modernize them (use softprops/action-gh-release etc.).
      # For now you get clean, direct artifact downloads from the workflow run.
