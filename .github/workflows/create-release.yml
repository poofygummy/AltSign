name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_xcframework:
    name: Build XCFramework
    runs-on: macos-latest
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Write xcconfig
        run: |
          echo 'FRAMEWORK_SEARCH_PATHS = $(inherited) ${{ github.workspace }}/Dependencies' > /tmp/altsign.xcconfig

      - name: Install swift-create-xcframework via Mint
        run: mint install unsignedapps/swift-create-xcframework@v2.3.0

      - name: Build XCFramework
        run: |
          mint run unsignedapps/swift-create-xcframework@v2.3.0 \
            --zip \
            --platform ios \
            --xcconfig /tmp/altsign.xcconfig \
            AltSign

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: "*.zip"
          draft: false
          prerelease: false
          generate_release_notes: true
