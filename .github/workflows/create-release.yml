name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_xcframework:
    name: Build XCFramework
    runs-on: macos-latest
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Generate Xcode project
        run: swift package generate-xcodeproj --output /tmp/AltSign.xcodeproj

      - name: Build XCFramework
        run: |
          set -euo pipefail

          # Build archive for iOS device
          xcodebuild archive \
            -project /tmp/AltSign.xcodeproj \
            -scheme AltSign-Dynamic \
            -destination "generic/platform=iOS" \
            -archivePath /tmp/AltSign-ios \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            FRAMEWORK_SEARCH_PATHS="${{ github.workspace }}/Dependencies"

          # Build archive for iOS Simulator
          xcodebuild archive \
            -project /tmp/AltSign.xcodeproj \
            -scheme AltSign-Dynamic \
            -destination "generic/platform=iOS Simulator" \
            -archivePath /tmp/AltSign-ios-sim \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            FRAMEWORK_SEARCH_PATHS="${{ github.workspace }}/Dependencies"

          # Create XCFramework
          xcodebuild -create-xcframework \
            -archive /tmp/AltSign-ios.xcarchive -framework AltSign.framework \
            -archive /tmp/AltSign-ios-sim.xcarchive -framework AltSign.framework \
            -output AltSign.xcframework

          # Zip it
          zip -r AltSign.xcframework.zip AltSign.xcframework

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: "*.zip"
          draft: false
          prerelease: false
          generate_release_notes: true
